<!DOCTYPE html>
<html>
<head>
<title>Calendar</title>
<link rel="stylesheet" href="static/style.css">
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</head>

<body>

<div class="sidebar">
    <h2>SmartHR</h2>
    <a onclick="go('index.html')">🏠 Home</a>
    <a onclick="go('employees.html')">👨‍💼 Employees</a>
    <a class="active">📅 Calendar</a>
    <a onclick="go('meetings.html')">⏰ Meetings</a>
    <a onclick="go('gallery.html')">🖼 Gallery</a>
</div>

<div class="main">
    <h1>📅 Company Calendar</h1>

    <div class="card">
        <input type="date" id="date">
        <input type="text" id="event" placeholder="Event Name">
        <button onclick="addEvent()">Add</button>
    </div>

    <div class="card">
        <h3>Upcoming Events</h3>
        <ul id="eventList"></ul>
    </div>
</div>

<script>
function addEvent(){
    let date = document.getElementById("date").value;
    let event = document.getElementById("event").value;

    if(date && event){
        let list = JSON.parse(localStorage.getItem("events")) || [];
        list.push({date, event});
        localStorage.setItem("events", JSON.stringify(list));
        displayEvents();
    }
}

function displayEvents(){
    let list = JSON.parse(localStorage.getItem("events")) || [];
    let ul = document.getElementById("eventList");
    ul.innerHTML = "";

    list.forEach(e=>{
        let li = document.createElement("li");
        li.innerText = e.date + " - " + e.event;
        ul.appendChild(li);
    });
}

displayEvents();
</script>

</body>
</html>
