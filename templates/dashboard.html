<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/app.js"></script>
</head>

<body>

<div class="sidebar">
<h2>SmartHR</h2>
<a onclick="go('index.html')">Home</a>
</div>

<div class="main">

<h1>Dashboard</h1>

<div class="card" onclick="go('employees.html')">
    <h3>👨‍💼 Employees</h3>
    <p>Total: 10</p>
</div>

<div class="card" onclick="go('meetings.html')">
    <h3>📅 Meetings</h3>
    <p>Today: 3</p>
</div>

<div class="card" onclick="go('calendar.html')">
    <h3>📊 Performance</h3>
    <p>Weekly</p>
</div>

<canvas id="chart"></canvas>

</div>

<script>
new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: ["Mon","Tue","Wed","Thu","Fri"],
        datasets: [{
            label: "Performance",
            data: [10,20,15,25,30]
        }]
    }
});
const emps = JSON.parse(localStorage.getItem("emps")) || [];
const meets = JSON.parse(localStorage.getItem("meetings")) || [];
const events = JSON.parse(localStorage.getItem("events")) || [];

document.getElementById("empCount").innerText = emps.length;
document.getElementById("meetCount").innerText = meets.length;
document.getElementById("eventCount").innerText = events.length;
</script>

</body>
</html>
