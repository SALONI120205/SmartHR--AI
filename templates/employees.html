<div class="main">
  <h2>Employees</h2>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search employee..." onkeyup="searchEmp()">

  <!-- Add Employee -->
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="age" placeholder="Age">
  <input type="text" id="role" placeholder="Role">
  <input type="number" id="salary" placeholder="Salary">
  <button onclick="addEmployee()">Add</button>

  <!-- Table -->
  <table id="empTable">
    <tr>
      <th>Name</th>
      <th>Role</th>
      <th>Salary</th>
      <th>Action</th>
    </tr>
  </table>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];

function render() {
  let table = document.getElementById("empTable");
  table.innerHTML = `
    <tr>
      <th>Name</th>
      <th>Role</th>
      <th>Salary</th>
      <th>Action</th>
    </tr>
  `;

  employees.forEach((emp, index) => {
    table.innerHTML += `
      <tr>
        <td>${emp.name}</td>
        <td>${emp.role}</td>
        <td>₹${emp.salary}</td>
        <td><button onclick="deleteEmp(${index})">❌</button></td>
      </tr>
    `;
  });
}

function addEmployee() {
  let name = document.getElementById("name").value;
  let role = document.getElementById("role").value;
  let salary = document.getElementById("salary").value;

  if (!name || !role || !salary) {
    alert("Fill all fields");
    return;
  }

  employees.push({ name, role, salary });
  localStorage.setItem("employees", JSON.stringify(employees));
  render();
}

function deleteEmp(i) {
  employees.splice(i, 1);
  localStorage.setItem("employees", JSON.stringify(employees));
  render();
}

function searchEmp() {
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("#empTable tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    let text = row.innerText.toLowerCase();
    row.style.display = text.includes(input) ? "" : "none";
  });
}

render();
</script>
