<!DOCTYPE html>
<html>
<head>
    <title>Employees - SmartHR</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="/js/app.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>SmartHR</h2>
    <p class="tagline">Manage employees, meetings, and AI hiring.</p>

    <button onclick="go('/dashboard')">📊 Dashboard</button>
    <button class="active">👨‍💼 Employees</button>
    <button onclick="go('/calendar')">📅 Calendar</button>
    <button onclick="go('/attendance')">📝 Attendance</button>
    <button onclick="go('/salary')">💰 Salary</button>
    <button onclick="go('/meetings')">⏰ Meetings</button>
    <button onclick="go('/resume')">🤖 Resume AI</button>
    <button onclick="go('/gallery')">🖼 Gallery</button>
</div>

<!-- MAIN -->
<div class="main">

    <h1>👨‍💼 Employees</h1>

    <!-- ADD FORM -->
    <div class="card">
        <input type="text" id="name" placeholder="👤 Employee Name">
        <input type="number" id="age" placeholder="🎂 Age">
        <input type="text" id="city" placeholder="🏙 City">
        <input type="text" id="role" placeholder="💼 Role">
        <input type="number" id="salary" placeholder="💰 Salary">

        <button onclick="addEmployee()">Add Employee</button>
    </div>

    <!-- TABLE -->
    <div class="card">
        <table id="empTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>City</th>
                    <th>Role</th>
                    <th>Salary</th>
                    <th style="text-align:center;">Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will come from JS -->
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
