<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/app.js"></script>

<style>
.gallery-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.gallery-card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
    text-align:center;
}

.gallery-card:hover{
    transform:scale(1.05);
}

.gallery-card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>SmartHR</h2>
    <a onclick="go('index.html')">🏠 Home</a>
    <a onclick="go('employees.html')">👨‍💼 Employees</a>
    <a onclick="go('calendar.html')">📅 Calendar</a>
    <a onclick="go('meetings.html')">⏰ Meetings</a>
    <a class="active">🖼 Gallery</a>
</div>

<div class="main">
    <h1>🏆 Company Gallery</h1>

    <div class="gallery-grid">

        <div class="gallery-card">
            <img src="https://images.unsplash.com/photo-1556745757-8d76bdb6984b">
            <p>Best Company Award</p>
        </div>

        <div class="gallery-card">
            <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
            <p>Team Achievement</p>
        </div>

        <div class="gallery-card">
            <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
            <p>Office Moments</p>
        </div>

        <div class="gallery-card">
            <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
            <p>Annual Meetup</p>
        </div>

    </div>
</div>

</body>
</html>
