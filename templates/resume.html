<div class="main">
  <h2>AI Resume Screening 🤖</h2>

  <input type="file" id="resumeFile">
  <button onclick="analyze()">Analyze</button>

  <p id="result"></p>
</div>

<script>
function analyze() {
  let file = document.getElementById("resumeFile").files[0];

  if (!file) {
    alert("Upload resume first");
    return;
  }

  // Fake AI logic (frontend demo)
  let score = Math.floor(Math.random() * 100);

  document.getElementById("result").innerHTML =
    "Resume Score: " + score + "%<br>" +
    (score > 60 ? "✅ Selected" : "❌ Rejected");
}
</script>
