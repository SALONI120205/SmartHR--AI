<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screening</title>

    <link rel="stylesheet" href="/static/style.css">
    <script src="js/app.js"></script>
<script src="js/ai.js"></script>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Smart HR</h2>

        <button onclick="go('/')">Dashboard</button>
        <button onclick="go('/employees')">Employees</button>
        <button class="active">AI Resume</button>

        <button onclick="toggleDark()">🌙 Dark Mode</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>AI Resume Screening</h1>

        <div class="card">

            <input type="file" id="resumeFile">

            <button onclick="analyzeResume()">Analyze</button>

            <h2 id="score"></h2>
            <h3 id="result"></h3>

        </div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
